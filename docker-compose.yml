services:
  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    environment: [NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1]
    ports: ["3000:3000"]
    restart: unless-stopped
    depends_on: [api]
  api:
    build: { context: ./apps/api, dockerfile: Dockerfile }
    env_file: ./apps/api/.env
    environment:
      # Override the host-oriented values in .env (used for local/venv development)
      # with the in-network service names docker-compose provides.
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_sales_agent
      - REDIS_URL=redis://redis:6379/0
    ports: ["8000:8000"]
    restart: unless-stopped
    volumes: [api_uploads:/app/uploads]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
  worker:
    # Same image as `api` — only the command differs. Consumes every queue
    # app/workers/celery_app.py defines (ai/research/email/sending/metrics/
    # inbox/meetings/campaigns/analytics/celery) — this previously only
    # listened on `ai,celery`, so every other module's Celery tasks
    # (research/email/reply finalize, scheduled sends, metrics aggregation,
    # meeting reminders, campaign steps, analytics/reports) were dispatched
    # but never actually consumed under `docker compose up`.
    build: { context: ./apps/api, dockerfile: Dockerfile }
    env_file: ./apps/api/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_sales_agent
      - REDIS_URL=redis://redis:6379/0
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "-Q", "ai,research,email,sending,metrics,inbox,meetings,campaigns,analytics,celery", "--concurrency=4"]
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
  beat:
    # Same image as `worker`/`api` — only the command differs. Fires the
    # periodic tasks celery_app.py's `beat_schedule` defines (scheduled email
    # dispatch, hourly metrics aggregation, meeting reminders, campaign step
    # dispatch, daily analytics aggregation, scheduled report delivery) — did
    # not exist in this file before, so none of those ever ran under
    # `docker compose up`.
    build: { context: ./apps/api, dockerfile: Dockerfile }
    env_file: ./apps/api/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_sales_agent
      - REDIS_URL=redis://redis:6379/0
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: ai_sales_agent, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U postgres -d ai_sales_agent"], interval: 5s, timeout: 5s, retries: 10 }
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    restart: unless-stopped
volumes: { postgres_data: {}, redis_data: {}, api_uploads: {} }