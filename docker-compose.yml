services:
  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    environment: [NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1]
    ports: ["3000:3000"]
    depends_on: [api]
  api:
    build: { context: ./apps/api, dockerfile: Dockerfile }
    env_file: .env
    ports: ["8000:8000"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started } }
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: ai_sales_agent, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U postgres -d ai_sales_agent"], interval: 5s, timeout: 5s, retries: 10 }
  redis:
    image: redis:7-alpine
    volumes: [redis_data:/data]
volumes: { postgres_data: {}, redis_data: {} }
